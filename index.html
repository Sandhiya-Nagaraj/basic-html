<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reestar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&display=swap" rel="stylesheet">

</head>

<body>
    <div class="navbar">
        <div>
            <h1 class="navbar__title">Reestar</h1>
        </div>

        <div class="navbar__menu">
            <p class="navbar__menu__item"> Home</p>
            <p class="navbar__menu__item">|</p>
            <p class="navbar__menu__item"> Receipe</p>
            <p class="navbar__menu__item">|</p>
            <p class="navbar__menu__item"> Contact</p>
        </div>
    </div>

    <div class="section-one">
        <div class="card">
            <div class="">
                <img src="image/img1.jpg" class="card-image" alt="Prawn fry">
            </div>
            <div class="card__bottom">
                <h3>Prawn fry</h3>
                <p>More Delisious</p>
                <button>Order Now</button>
            </div>
        </div>
        <div class="card">
            <div class="">
                <img src="image/img2.jpg" class="card-image" alt="Prawn fry">
            </div>
            <div class="card__bottom">
                <h3>Noodles</h3>
                <p>Delisious food</p>
                <button>Order Now</button>
            </div>
        </div>
        <div class="card">
            <div class="">
                <img src="image/img3.jpg" class="card-image" alt="Prawn fry">
            </div>
            <div class="card__bottom">
                <h3>Momos</h3>
                <p>Delisious snacks</p>
                <button>Order Now</button>
            </div>
        </div>
        <div class="card">
            <div class="">
                <img src="image/img4.jpg" class="card-image" alt="Prawn fry">
            </div>
            <div class="card__bottom">
                <h3>Dessert</h3>
                <p>Creamy Choco</p>
                <button>Order Now</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <div>
            <h3>Contact Us</h3>
        </div>
        <div>
            <table class="footer__table">
                <tr>
                    <td>
                        <label for="name">Name:</label>
                    </td>
                    <td>
                        <input type="text" placeholder="Name">
                    </td>
                </tr>
                 <tr>
                    <td>
                        <label for="Age">Age:</label>
                    </td>
                    <td>
                        <input type="text" placeholder="Age">
                    </td>
                </tr>
                 <tr>
                    <td>
                        <label for="email">Email:</label>
                    </td>
                    <td>
                        <input type="email" placeholder="Email">
                    </td>
                </tr>
            </table>
        </div>
        <button class="footer__table__button">Send</button>
    </div>

</body>
